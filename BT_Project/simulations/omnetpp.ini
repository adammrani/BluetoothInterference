# ============================================================
#  BluetoothInterference Simulation
#  Project: Performance Impact of Interference and Security
#           Threats in Bluetooth Communication
#  Course : 2A CS&CMC - Wireless & Mobile Networks
#  Tool   : OMNeT++ 6.x + INET 4.6.0
# ============================================================

[General]
network = BluetoothNetwork
*.**.wlan[0].radio.receiver.energyDetection = -85dBm
*.**.wlan[0].radio.receiver.sensitivity = -85dBm
sim-time-limit = 60s
*.radioMedium.backgroundNoise.power = -110dBm
**.scalar-recording = true
**.vector-recording = true

# ── Visualizer ──────────────────────────────────────────────
*.visualizer.*.displayCommunicationRange = true
*.visualizer.*.displayInterferenceRange  = true
*.visualizer.*.displaySignals            = true

# ── Radio Medium (2.4 GHz ISM, Bluetooth-like) ──────────────
*.radioMedium.typename           = "RadioMedium"
*.radioMedium.communicationRange = 15m
*.radioMedium.interferenceRange  = 25m

# ── Wireless interface – legitimate nodes ───────────────────
*.master.**.wlan[0].typename                = "Ieee80211Interface"
*.master.**.wlan[0].radio.transmitter.power = 1mW
*.master.**.wlan[0].bitrate                 = 2Mbps

*.slave*.**.wlan[0].typename                = "Ieee80211Interface"
*.slave*.**.wlan[0].radio.transmitter.power = 1mW
*.slave*.**.wlan[0].bitrate                 = 2Mbps

# ── Positions ───────────────────────────────────────────────
*.master.mobility.initialX    = 400m
*.master.mobility.initialY    = 300m
*.slave1.mobility.initialX    = 250m
*.slave1.mobility.initialY    = 200m
*.slave2.mobility.initialX    = 550m
*.slave2.mobility.initialY    = 200m
*.slave3.mobility.initialX    = 400m
*.slave3.mobility.initialY    = 450m
*.attacker1.mobility.initialX = 150m
*.attacker1.mobility.initialY = 450m
*.attacker2.mobility.initialX = 650m
*.attacker2.mobility.initialY = 450m

# ── Mobility: all stationary by default ─────────────────────
*.master.mobility.typename    = "StationaryMobility"
*.slave1.mobility.typename    = "StationaryMobility"
*.slave2.mobility.typename    = "StationaryMobility"
*.slave3.mobility.typename    = "StationaryMobility"
*.attacker1.mobility.typename = "StationaryMobility"
*.attacker2.mobility.typename = "StationaryMobility"

# ── Legitimate traffic: master → slaves (UDP) ───────────────
*.master.numApps = 1
*.master.app[0].typename      = "UdpBasicApp"
*.master.app[0].destAddresses = "slave1 slave2 slave3"
*.master.app[0].destPort      = 5000
*.master.app[0].messageLength = 200B
*.master.app[0].sendInterval  = 0.02s

*.slave1.numApps = 1
*.slave1.app[0].typename  = "UdpSink"
*.slave1.app[0].localPort = 5000

*.slave2.numApps = 1
*.slave2.app[0].typename  = "UdpSink"
*.slave2.app[0].localPort = 5000

*.slave3.numApps = 1
*.slave3.app[0].typename  = "UdpSink"
*.slave3.app[0].localPort = 5000


# ============================================================
# SCENARIO 1 – Baseline (no attackers)
# ============================================================
[Config Scenario1_Baseline]
description = "Baseline: normal piconet, no attacker active"

*.attacker1.numApps = 0
*.attacker2.numApps = 0


# ============================================================
# SCENARIO 2 – RF Jamming
#   attacker1 moves close to master and floods at 100mW
# ============================================================
[Config Scenario2_Jamming]
description = "RF Jamming: attacker1 saturates channel at 100mW"

*.attacker1.**.wlan[0].typename                = "Ieee80211Interface"
*.attacker1.**.wlan[0].radio.transmitter.power = 100mW
*.attacker1.**.wlan[0].bitrate                 = 54Mbps
*.attacker1.mobility.initialX = 350m
*.attacker1.mobility.initialY = 310m

*.attacker1.numApps = 1
*.attacker1.app[0].typename      = "UdpBasicApp"
*.attacker1.app[0].destAddresses = "master"
*.attacker1.app[0].destPort      = 9999
*.attacker1.app[0].messageLength = 1460B
*.attacker1.app[0].sendInterval  = 0.001s

*.attacker2.numApps = 0


# ============================================================
# SCENARIO 3 – DoS / Traffic Injection
#   attacker2 sends forged UDP packets to slave1 port 5000
# ============================================================
[Config Scenario3_DoS_Injection]
description = "DoS Injection: attacker2 floods slave1 with forged packets"

*.attacker2.**.wlan[0].typename                = "Ieee80211Interface"
*.attacker2.**.wlan[0].radio.transmitter.power = 5mW
*.attacker2.**.wlan[0].bitrate                 = 2Mbps
*.attacker2.mobility.initialX = 260m
*.attacker2.mobility.initialY = 210m

*.attacker2.numApps = 1
*.attacker2.app[0].typename      = "UdpBasicApp"
*.attacker2.app[0].destAddresses = "slave1"
*.attacker2.app[0].destPort      = 5000
*.attacker2.app[0].messageLength = 200B
*.attacker2.app[0].sendInterval  = 0.005s

*.attacker1.numApps = 0


# ============================================================
# SCENARIO 4 – Combined Attack (Jamming + Injection)
# ============================================================
[Config Scenario4_Combined]
description = "Combined: attacker1 jams + attacker2 injects simultaneously"

*.attacker1.**.wlan[0].typename                = "Ieee80211Interface"
*.attacker1.**.wlan[0].radio.transmitter.power = 100mW
*.attacker1.**.wlan[0].bitrate                 = 54Mbps
*.attacker1.mobility.initialX = 350m
*.attacker1.mobility.initialY = 310m
*.attacker1.numApps = 1
*.attacker1.app[0].typename      = "UdpBasicApp"
*.attacker1.app[0].destAddresses = "master"
*.attacker1.app[0].destPort      = 9999
*.attacker1.app[0].messageLength = 1460B
*.attacker1.app[0].sendInterval  = 0.001s

*.attacker2.**.wlan[0].typename                = "Ieee80211Interface"
*.attacker2.**.wlan[0].radio.transmitter.power = 5mW
*.attacker2.**.wlan[0].bitrate                 = 2Mbps
*.attacker2.mobility.initialX = 260m
*.attacker2.mobility.initialY = 210m
*.attacker2.numApps = 1
*.attacker2.app[0].typename      = "UdpBasicApp"
*.attacker2.app[0].destAddresses = "slave1"
*.attacker2.app[0].destPort      = 5000
*.attacker2.app[0].messageLength = 200B
*.attacker2.app[0].sendInterval  = 0.005s


# ============================================================
# SCENARIO 5 – Mobile Slaves under Jamming
#   Slaves move randomly (simulating FHSS channel diversity)
# ============================================================
[Config Scenario5_Mobility_Jamming]
description = "Mobile slaves under 50mW jamming - FHSS resilience test"

*.slave1.mobility.typename = "RandomWaypointMobility"
*.slave1.mobility.speed    = 1mps
*.slave2.mobility.typename = "RandomWaypointMobility"
*.slave2.mobility.speed    = 1mps
*.slave3.mobility.typename = "RandomWaypointMobility"
*.slave3.mobility.speed    = 0.5mps

*.attacker1.**.wlan[0].typename                = "Ieee80211Interface"
*.attacker1.**.wlan[0].radio.transmitter.power = 50mW
*.attacker1.**.wlan[0].bitrate                 = 54Mbps
*.attacker1.mobility.initialX = 350m
*.attacker1.mobility.initialY = 310m
*.attacker1.numApps = 1
*.attacker1.app[0].typename      = "UdpBasicApp"
*.attacker1.app[0].destAddresses = "master"
*.attacker1.app[0].destPort      = 9999
*.attacker1.app[0].messageLength = 1460B
*.attacker1.app[0].sendInterval  = 0.002s

*.attacker2.numApps = 0
